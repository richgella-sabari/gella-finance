<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gella Finance">
<meta name="mobile-web-app-capable" content="yes">
<title>Gella Family Finance</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
  :root {
    --bg: #050a14;
    --bg2: #0a1628;
    --panel: rgba(18, 32, 54, 0.55);
    --panel-solid: #121e34;
    --panel-border: rgba(0, 229, 204, 0.18);
    --text: #e6eef5;
    --text-mute: #8b9bad;
    --teal: #00E5CC;
    --teal-soft: rgba(0, 229, 204, 0.12);
    --blue: #0088FF;
    --amber: #FFB300;
    --red: #FF4444;
    --green: #3fb950;
    --green-soft: rgba(63, 185, 80, 0.12);
    --red-soft: rgba(255, 68, 68, 0.12);
    --shadow: 0 8px 30px rgba(0, 136, 255, 0.08);
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; -webkit-tap-highlight-color: transparent; }
  body {
    background:
      radial-gradient(ellipse at top, #0a1830 0%, #050a14 60%),
      var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom, 12px);
  }

  /* ── Header ─────────────────────────────────────── */
  header {
    background: rgba(5, 10, 20, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--panel-border);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 50;
  }
  header h1 {
    font-size: 16px; font-weight: 600;
    letter-spacing: 1.5px; color: var(--teal); text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  header h1 .accent { color: #fff; }
  header .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 11px; }
  .pill {
    padding: 4px 10px; border-radius: 999px;
    background: rgba(0, 229, 204, 0.08); color: var(--teal);
    border: 1px solid var(--panel-border);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    letter-spacing: 0.5px;
  }
  .pill.warn { background: rgba(255, 179, 0, 0.1); color: var(--amber);
               border-color: rgba(255, 179, 0, 0.3); }
  .pill.bad  { background: rgba(255, 68, 68, 0.1); color: var(--red);
               border-color: rgba(255, 68, 68, 0.3); }
  .pill.ok   { background: rgba(63, 185, 80, 0.1); color: var(--green);
               border-color: rgba(63, 185, 80, 0.3); }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
         margin-right: 4px; box-shadow: 0 0 6px currentColor; }

  /* ── Layout ─────────────────────────────────────── */
  main { max-width: 1100px; margin: 0 auto; padding: 16px; }

  /* ── Summary cards ──────────────────────────────── */
  .summary {
    display: grid; gap: 12px;
    grid-template-columns: repeat(3, 1fr);
    margin-bottom: 16px;
  }
  .stat {
    background: var(--panel);
    backdrop-filter: blur(10px);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow);
  }
  .stat .k {
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-mute);
  }
  .stat .v {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 26px; font-weight: 600; margin-top: 6px;
    line-height: 1.1;
  }
  .stat.income .v { color: var(--green); }
  .stat.expense .v { color: var(--red); }
  .stat.balance .v { color: var(--teal); }

  /* ── Action bar (add entry trigger + tabs) ───── */
  .action-bar {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .chips { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
  .chip {
    padding: 7px 14px; border-radius: 999px;
    background: var(--panel); color: var(--text-mute);
    border: 1px solid var(--panel-border);
    cursor: pointer; font-size: 12px; font-weight: 500;
    transition: all 0.15s;
  }
  .chip:hover { color: var(--text); }
  .chip.active {
    background: var(--teal-soft); color: var(--teal);
    border-color: var(--teal);
  }
  .btn {
    padding: 8px 18px; border-radius: 8px; border: 1px solid var(--panel-border);
    background: var(--panel); color: var(--text);
    font: 600 13px/1 inherit; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--teal-soft); border-color: var(--teal); color: var(--teal); }
  .btn-primary {
    background: var(--teal); color: #001a16; border-color: var(--teal);
    font-weight: 700;
  }
  .btn-primary:hover { opacity: 0.85; background: var(--teal); color: #001a16; }
  .btn-danger { background: transparent; color: var(--red); border-color: rgba(255,68,68,0.4); }
  .btn-danger:hover { background: var(--red-soft); color: var(--red); }

  /* ── Add Entry panel (collapsible) ──────────── */
  .add-panel {
    background: var(--panel); backdrop-filter: blur(10px);
    border: 1px solid var(--panel-border); border-radius: var(--radius);
    margin-bottom: 16px; overflow: hidden;
    box-shadow: var(--shadow);
    max-height: 0; transition: max-height 0.35s ease;
  }
  .add-panel.open { max-height: 700px; }
  .add-panel-inner { padding: 18px; }
  .add-panel h3 {
    font-size: 11px; letter-spacing: 1.5px; color: var(--teal);
    text-transform: uppercase; margin-bottom: 14px;
  }
  .form-grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label {
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-mute);
  }
  input, select {
    width: 100%; padding: 10px 12px; min-height: 42px;
    background: rgba(0, 0, 0, 0.3);
    color: var(--text); font: inherit; font-size: 14px;
    border: 1px solid var(--panel-border); border-radius: 8px;
    outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--teal); }
  input::placeholder { color: rgba(139, 155, 173, 0.6); }
  select { cursor: pointer; }
  /* dark dropdown options */
  select option { background: var(--panel-solid); color: var(--text); }
  .form-actions {
    margin-top: 14px; display: flex; justify-content: flex-end; gap: 8px;
  }

  /* ── Entries list (cards on mobile, table on desktop) ── */
  .list { background: var(--panel); backdrop-filter: blur(10px);
          border: 1px solid var(--panel-border); border-radius: var(--radius);
          overflow: hidden; box-shadow: var(--shadow); margin-bottom: 16px; }
  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--panel-border);
  }
  .list-header h3 {
    font-size: 11px; letter-spacing: 1.5px; color: var(--teal);
    text-transform: uppercase;
  }
  .entry {
    display: grid; gap: 8px;
    grid-template-columns: 80px 1fr auto;
    align-items: center;
    padding: 12px 18px;
    border-bottom: 1px solid rgba(0, 229, 204, 0.06);
    transition: background 0.1s;
  }
  .entry:hover { background: rgba(0, 229, 204, 0.04); }
  .entry:last-child { border-bottom: none; }
  .entry .date {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px; color: var(--text-mute);
  }
  .entry .body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .entry .row1 {
    display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
  }
  .entry .source { font-weight: 600; color: var(--text); }
  .entry .cat-tag {
    font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase;
    background: var(--teal-soft); color: var(--teal);
    padding: 2px 8px; border-radius: 999px;
    border: 1px solid rgba(0, 229, 204, 0.2);
  }
  .entry .meta {
    font-size: 11px; color: var(--text-mute);
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .entry .amount {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 16px; font-weight: 700;
    text-align: right; white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  .entry.income .amount { color: var(--green); }
  .entry.expense .amount { color: var(--red); }
  .delete-btn {
    background: transparent; border: none; color: rgba(255, 68, 68, 0.4);
    cursor: pointer; font-size: 16px; padding: 4px 8px;
    transition: color 0.15s;
  }
  .delete-btn:hover { color: var(--red); }
  .empty {
    padding: 40px 20px; text-align: center; color: var(--text-mute);
    font-style: italic;
  }

  /* ── Audit log (compact) ──────────────────── */
  .audit {
    background: var(--panel); backdrop-filter: blur(10px);
    border: 1px solid var(--panel-border); border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .audit-banner {
    background: rgba(255, 179, 0, 0.08); color: var(--amber);
    border-bottom: 1px solid rgba(255, 179, 0, 0.2);
    padding: 10px 18px; font-size: 11px;
  }
  .audit-row {
    display: grid; grid-template-columns: 110px 70px 1fr;
    gap: 10px; padding: 8px 18px;
    border-bottom: 1px solid rgba(0, 229, 204, 0.05);
    font-size: 12px;
  }
  .audit-row:last-child { border-bottom: none; }
  .audit-row .when {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-mute);
  }
  .audit-row .act { font-weight: 600; font-size: 10px; letter-spacing: 0.5px; }
  .act.added { color: var(--green); }
  .act.deleted { color: var(--red); }

  /* ── Mobile (< 640px) ─────────────────────── */
  @media (max-width: 640px) {
    main { padding: 12px; }
    .summary { grid-template-columns: 1fr; }
    .stat .v { font-size: 22px; }
    .form-grid { grid-template-columns: 1fr; }
    .entry { grid-template-columns: 1fr auto; gap: 4px 12px; }
    .entry .date { grid-column: 1 / -1; font-size: 10px; }
    .entry .body { grid-column: 1; }
    .entry .amount { grid-column: 2; grid-row: 2; align-self: end; }
    /* fix iOS zoom on input focus */
    input, select { font-size: 16px; }
    /* sticky add-entry FAB on mobile */
    .fab {
      position: fixed; bottom: 16px; right: 16px;
      width: 56px; height: 56px; border-radius: 28px;
      background: var(--teal); color: #001a16;
      border: none; cursor: pointer;
      font-size: 28px; font-weight: 700;
      box-shadow: 0 4px 16px rgba(0, 229, 204, 0.4);
      z-index: 60;
      display: flex; align-items: center; justify-content: center;
    }
    .fab:active { transform: scale(0.94); }
    .desktop-add-btn { display: none; }
    .audit-row { grid-template-columns: 1fr auto; gap: 4px; }
    .audit-row .when { grid-column: 1; }
    .audit-row .act { grid-column: 2; }
    .audit-row .body { grid-column: 1 / -1; }
  }
  @media (min-width: 641px) {
    .fab { display: none; }
  }

  /* ── Name prompt ────────────────────────── */
  .name-prompt {
    background: rgba(0, 229, 204, 0.08);
    border-bottom: 1px solid var(--panel-border);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    font-size: 13px;
  }
  .name-prompt input { max-width: 200px; min-height: 36px; padding: 6px 10px; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(0, 229, 204, 0.2); border-radius: 4px;
  }
</style>
</head>
<body>

<div class="name-prompt" id="namePrompt">
  <span>👤 Who's adding entries?</span>
  <input type="text" id="nameInput" placeholder="Rich or Nina" maxlength="30">
  <button class="btn btn-primary" onclick="setUser()">Continue</button>
</div>

<header>
  <h1>▲ GELLA · <span class="accent">FINANCE</span></h1>
  <div class="meta">
    <span class="pill" id="userBadge">👤 —</span>
    <span class="pill warn" id="syncStatus"><span class="dot"></span>connecting</span>
  </div>
</header>

<main>

  <!-- Summary -->
  <section class="summary">
    <div class="stat income">
      <div class="k">Income</div>
      <div class="v" id="totalIncome">₱0</div>
    </div>
    <div class="stat expense">
      <div class="k">Expenses</div>
      <div class="v" id="totalExpenses">₱0</div>
    </div>
    <div class="stat balance">
      <div class="k">Net</div>
      <div class="v" id="netBalance">₱0</div>
    </div>
  </section>

  <!-- Filter chips + add-entry button -->
  <div class="action-bar">
    <div class="chips">
      <button class="chip active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="chip" data-filter="income" onclick="setFilter('income')">Income</button>
      <button class="chip" data-filter="expense" onclick="setFilter('expense')">Expenses</button>
      <button class="chip" data-filter="thisMonth" onclick="setFilter('thisMonth')">This Month</button>
    </div>
    <button class="btn btn-primary desktop-add-btn" onclick="toggleAddPanel()">＋ Add Entry</button>
    <button class="btn" onclick="exportCSV()">📥 CSV</button>
  </div>

  <!-- Add Entry (collapsible) -->
  <section class="add-panel" id="addPanel">
    <div class="add-panel-inner">
      <h3>＋ New Entry</h3>
      <div class="form-grid">
        <div class="field">
          <label>Type</label>
          <select id="type">
            <option value="income">Income</option>
            <option value="expense" selected>Expense</option>
          </select>
        </div>
        <div class="field">
          <label>Amount (PHP)</label>
          <input type="number" id="amount" placeholder="0.00" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label>Category</label>
          <select id="category">
            <option value="">— select —</option>
            <optgroup label="Income">
              <option>Consulting</option>
              <option>Salary</option>
              <option>Business</option>
              <option>Transfer Received</option>
              <option>Other Income</option>
            </optgroup>
            <optgroup label="Expenses">
              <option>Food</option>
              <option>Transport</option>
              <option>Utilities</option>
              <option>Health</option>
              <option>Education</option>
              <option>Shopping</option>
              <option>Entertainment</option>
              <option>Household</option>
              <option>Personal</option>
              <option>Family</option>
              <option>Kids</option>
              <option>Travel</option>
              <option>Subscriptions</option>
              <option>Other</option>
            </optgroup>
          </select>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="date">
        </div>
        <div class="field">
          <label>Payment</label>
          <select id="payment">
            <option value="">— select —</option>
            <option>Cash</option>
            <option>Card</option>
            <option>GCash</option>
            <option>Maya</option>
            <option>Bank</option>
            <option>MariBank</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>For</label>
          <select id="forWhom">
            <option value="">— select —</option>
            <option>Rich</option>
            <option>Nina</option>
            <option>Family</option>
            <option>Kids</option>
          </select>
        </div>
        <div class="field" style="grid-column: 1 / -1;">
          <label>Source / Payee</label>
          <input type="text" id="source" placeholder="e.g. SM Supermarket, Mendokoro, Infinity Broadband">
        </div>
        <div class="field" style="grid-column: 1 / -1;">
          <label>Note (optional)</label>
          <input type="text" id="description" placeholder="anything to remember about this">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="toggleAddPanel()">Cancel</button>
        <button class="btn btn-primary" onclick="addEntry()">Save</button>
      </div>
    </div>
  </section>

  <!-- Entries -->
  <section class="list">
    <div class="list-header">
      <h3>📋 Entries</h3>
      <span class="pill" id="entryCount">0</span>
    </div>
    <div id="tableBody"></div>
  </section>

  <!-- Audit -->
  <section class="audit">
    <div class="list-header">
      <h3>🔐 Audit Trail</h3>
      <button class="btn" onclick="toggleLog()" id="logToggle">Hide</button>
    </div>
    <div class="audit-banner">
      ⚠️ Audit is read-only and cannot be deleted. Every change is permanently recorded.
    </div>
    <div id="logSection"><div id="logBody"></div></div>
  </section>

</main>

<button class="fab" onclick="toggleAddPanel()" aria-label="Add entry">＋</button>

<script>
const firebaseConfig = { databaseURL: "https://finance-tracker-gella-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const entriesRef = db.ref('entries');
const logRef = db.ref('auditTrail');

let entries = [];
let auditLog = [];
let currentFilter = 'all';
let logVisible = true;

let currentUser = localStorage.getItem('gella_user') || '';
updateUserDisplay();

function setUser() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  currentUser = name;
  localStorage.setItem('gella_user', name);
  updateUserDisplay();
  document.getElementById('namePrompt').style.display = 'none';
}

function updateUserDisplay() {
  document.getElementById('userBadge').textContent = '👤 ' + (currentUser || '—');
  if (currentUser) document.getElementById('namePrompt').style.display = 'none';
}

function getDevice() {
  const ua = navigator.userAgent;
  if (/iPhone|iPad|iPod/.test(ua)) return '📱 iOS';
  if (/Android/.test(ua)) return '📱 Android';
  if (/Mac/.test(ua)) return '💻 Mac';
  if (/Windows/.test(ua)) return '💻 Win';
  return '🖥️ Web';
}

document.getElementById('date').value = new Date().toISOString().split('T')[0];

db.ref('.info/connected').on('value', snap => {
  const el = document.getElementById('syncStatus');
  if (snap.val()) { el.innerHTML = '<span class="dot"></span>synced'; el.className = 'pill ok'; }
  else { el.innerHTML = '<span class="dot"></span>offline'; el.className = 'pill bad'; }
});

entriesRef.on('value', snap => {
  const data = snap.val();
  if (!data) { entries = []; render(); return; }
  entries = Object.entries(data).map(([key, val]) => ({ ...val, _key: key }));
  entries.sort((a, b) => (b.ts || 0) - (a.ts || 0));
  render();
});

logRef.on('value', snap => {
  const data = snap.val();
  if (!data) { auditLog = []; renderLog(); return; }
  auditLog = Object.entries(data).map(([key, val]) => ({ ...val, _key: key }));
  auditLog.sort((a, b) => (b.ts || 0) - (a.ts || 0));
  renderLog();
});

function writeAudit(action, entryId, entry, user, device) {
  logRef.push({
    action, entryId,
    user: user || 'Unknown',
    device: device || getDevice(),
    type: entry.type, amount: entry.amount,
    category: entry.category || '',
    source: entry.source || '',
    description: entry.description || '',
    date: entry.date || '',
    ts: Date.now()
  });
}

function fmt(n) {
  return '₱' + Number(n || 0).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtTime(ts) {
  if (!ts) return '-';
  return new Date(ts).toLocaleString('en-PH', {
    month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'
  });
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-PH', { month: 'short', day: 'numeric' });
}

function toggleAddPanel() {
  const p = document.getElementById('addPanel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) {
    setTimeout(() => document.getElementById('amount').focus(), 200);
  }
}

function addEntry() {
  if (!currentUser) { alert('Please enter your name first.'); return; }
  const type = document.getElementById('type').value;
  const amount = parseFloat(document.getElementById('amount').value);
  const category = document.getElementById('category').value;
  const date = document.getElementById('date').value;
  const payment = document.getElementById('payment').value;
  const forWhom = document.getElementById('forWhom').value;
  const source = document.getElementById('source').value;
  const description = document.getElementById('description').value;

  if (!amount || amount <= 0) { alert('Enter a valid amount.'); return; }
  if (!category) { alert('Select a category.'); return; }
  if (!date) { alert('Select a date.'); return; }

  const entry = { type, amount, category, date, payment, forWhom, source, description,
                  addedBy: currentUser, device: getDevice(), ts: Date.now() };
  const newRef = entriesRef.push(entry);
  writeAudit('ADDED', newRef.key, entry, currentUser, getDevice());

  ['amount', 'category', 'source', 'description'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('addPanel').classList.remove('open');
}

function deleteEntry(key) {
  if (!currentUser) { alert('Please enter your name first.'); return; }
  const entry = entries.find(e => e._key === key);
  if (!entry) return;
  if (!confirm(`Delete this ${entry.type}?\n${fmt(entry.amount)} · ${entry.category || ''}\n\nWill be recorded in audit.`)) return;
  writeAudit('DELETED', key, entry, currentUser, getDevice());
  entriesRef.child(key).remove();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
  render();
}

function toggleLog() {
  logVisible = !logVisible;
  document.getElementById('logSection').style.display = logVisible ? 'block' : 'none';
  document.getElementById('logToggle').textContent = logVisible ? 'Hide' : 'Show';
}

function applyFilter(list) {
  if (currentFilter === 'income' || currentFilter === 'expense') {
    return list.filter(e => e.type === currentFilter);
  }
  if (currentFilter === 'thisMonth') {
    const now = new Date();
    const ymPrefix = now.toISOString().slice(0, 7); // 'YYYY-MM'
    return list.filter(e => (e.date || '').startsWith(ymPrefix));
  }
  return list;
}

function render() {
  const filtered = applyFilter(entries);
  const tbody = document.getElementById('tableBody');

  if (!filtered.length) {
    tbody.innerHTML = '<div class="empty">No entries yet — tap ＋ to add one.</div>';
  } else {
    tbody.innerHTML = filtered.map(e => `
      <div class="entry ${e.type}">
        <div class="date">${fmtDate(e.date)}</div>
        <div class="body">
          <div class="row1">
            <span class="source">${escapeHtml(e.source || e.category || '—')}</span>
            ${e.category ? `<span class="cat-tag">${escapeHtml(e.category)}</span>` : ''}
          </div>
          <div class="meta">
            ${e.payment ? `<span>${escapeHtml(e.payment)}</span>` : ''}
            ${e.forWhom ? `<span>· for ${escapeHtml(e.forWhom)}</span>` : ''}
            ${e.description ? `<span>· ${escapeHtml(e.description)}</span>` : ''}
            <span>· by ${escapeHtml(e.addedBy || '?')}${e.device ? ' ' + escapeHtml(e.device) : ''}</span>
          </div>
        </div>
        <div class="amount">
          ${e.type === 'income' ? '+' : '−'}${fmt(e.amount)}
          <button class="delete-btn" onclick="deleteEntry('${e._key}')" aria-label="Delete">✕</button>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('entryCount').textContent = filtered.length + (filtered.length === entries.length ? '' : ' / ' + entries.length);

  const totalIncome = entries.filter(e => e.type === 'income').reduce((s, e) => s + Number(e.amount || 0), 0);
  const totalExpenses = entries.filter(e => e.type === 'expense').reduce((s, e) => s + Number(e.amount || 0), 0);
  document.getElementById('totalIncome').textContent = fmt(totalIncome);
  document.getElementById('totalExpenses').textContent = fmt(totalExpenses);
  const net = totalIncome - totalExpenses;
  const balEl = document.getElementById('netBalance');
  balEl.textContent = (net >= 0 ? '' : '−') + fmt(Math.abs(net));
  balEl.style.color = net >= 0 ? 'var(--teal)' : 'var(--red)';
}

function renderLog() {
  const logBody = document.getElementById('logBody');
  if (!auditLog.length) {
    logBody.innerHTML = '<div class="empty">No audit records yet</div>';
    return;
  }
  logBody.innerHTML = auditLog.slice(0, 50).map(l => `
    <div class="audit-row">
      <span class="when">${fmtTime(l.ts)}</span>
      <span class="act ${l.action === 'ADDED' ? 'added' : 'deleted'}">${l.action}</span>
      <span class="body" style="color: var(--text-mute);">
        <span style="color:${l.type === 'income' ? 'var(--green)' : 'var(--red)'}">${fmt(l.amount || 0)}</span>
        · ${escapeHtml(l.category || '?')}
        ${l.source ? '· ' + escapeHtml(l.source) : ''}
        · ${escapeHtml(l.user || '?')} ${escapeHtml(l.device || '')}
      </span>
    </div>
  `).join('');
  if (auditLog.length > 50) {
    logBody.innerHTML += `<div class="audit-row" style="color: var(--text-mute); justify-content: center;">… and ${auditLog.length - 50} more</div>`;
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  })[c]);
}

function exportCSV() {
  const headers = ['Date','Type','Category','Source/Payee','Description','Payment','For','Amount','Added By','Device'];
  const rows = entries.map(e => [e.date, e.type, e.category, e.source, e.description, e.payment, e.forWhom, e.amount, e.addedBy, e.device]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${(v ?? '').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `gella-finances-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
